{% extends 'base.html' %}

{% block content %}
<h2>Supprimer {{ batiment.nom }}</h2>

<p>Êtes-vous sûr de vouloir supprimer ce bâtiment ?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Oui, supprimer</button>
    <a href="{% url 'batiment_list' %}">Annuler</a>
</form>
{% endblock content %}
