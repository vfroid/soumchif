{% extends 'base.html' %}


{% block sidebar %}
    <p><a href="{% url 'home' %}">Accueil</a></p>
    <p><a href="{% url 'projet_new' %}">Nouveau Projet</a></p>
{% endblock sidebar %}


{% block content %}
    <h3>Liste des projets</h3>

    <table>
        <tr><th>Mandant</th><th>Description</th><th>Actions</th></tr>
        {% for p in projets %}
        <tr>
            <td>{{ p.mandant }}</td><td>{{ p.description }}</td>
            <td><a href="{% url 'projet_show' p.pk %}">Show</a> |
                <a href="{% url 'projet_edit' p.pk %}">Edit</a> |
                <a href="{% url 'projet_delete' p.pk %}">Delete</a></td>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
