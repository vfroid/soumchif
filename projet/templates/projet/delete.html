{% extends 'base.html' %}

{% block content %}
<h1>Supprimer le projet</h1>
<p>Êtes-vous sûr de vouloir supprimer le projet de  "{{ projet.mandant }}" : {{  projet.description }}?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" >Supprimer</button>
    <a href="{% url 'projet_show' projet.pk %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock content %}
