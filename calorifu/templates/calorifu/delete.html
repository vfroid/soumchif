{% extends 'base.html' %}

{% block content %}
<h2>Supprimer ce calorifugeage : {{ calorifu.article.nom }}</h2>

<p>Êtes-vous sûr de vouloir supprimer le calorifugeage de cet article ?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Oui, supprimer</button>
    <a href="{% url 'article_list' %}">Annuler</a>
</form>
{% endblock content %}
